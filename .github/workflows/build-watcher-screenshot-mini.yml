name: Build screenshot watcher portable

on:
  push:
    branches: [ master ]
    paths:
      - '.github/workflows/build-watcher-screenshot-mini.yml'
      - 'aw-watcher-screenshot-mini/**'
      - 'aw-client/**'
      - 'aw-core/**'
  pull_request:
    branches: [ master ]
    paths:
      - '.github/workflows/build-watcher-screenshot-mini.yml'
      - 'aw-watcher-screenshot-mini/**'
      - 'aw-client/**'
      - 'aw-core/**'
  workflow_dispatch:

jobs:
  build-windows-portable:
    name: Build Windows portable (py-${{ matrix.python_version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python_version: ["3.9"]

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python_version }}

      - name: Create virtualenv
        run: |
          python -m venv venv

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry==1.4.2

      - name: Install watcher dependencies
        working-directory: aw-watcher-screenshot-mini
        run: |
          source ../venv/Scripts/activate
          poetry install

      - name: Smoke test CLI
        working-directory: aw-watcher-screenshot-mini
        run: |
          source ../venv/Scripts/activate
          poetry run aw-watcher-screenshot-mini --help

      - name: Build portable package
        working-directory: aw-watcher-screenshot-mini
        run: |
          source ../venv/Scripts/activate
          make package

      - name: Test packaged executable
        run: |
          ./aw-watcher-screenshot-mini/dist/aw-watcher-screenshot-mini/aw-watcher-screenshot-mini.exe --help || \
          aw-watcher-screenshot-mini/dist/aw-watcher-screenshot-mini/aw-watcher-screenshot-mini.exe --help

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: aw-watcher-screenshot-mini-windows-py${{ matrix.python_version }}
          path: aw-watcher-screenshot-mini/dist/aw-watcher-screenshot-mini
          if-no-files-found: error
