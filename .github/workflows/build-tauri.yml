name: Build Tauri

on:
  push:
    branches: [master]
    tags:
      - v*
  pull_request:
    branches: [master]

jobs:
  build:
    name: ${{ matrix.os }}, py-${{ matrix.python_version }}, node-${{ matrix.node_version }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    env:
      # Keep optional extras out of the Tauri CI package; TAURI_WATCHERS below owns
      # the watcher set needed by the desktop bundle.
      AW_EXTRAS: false
      TAURI_BUILD: true
      TAURI_WATCHERS: aw-watcher-input aw-watcher-screenshot-mini aw-odoo-sync
      TAURI_SIGN: auto
      TAURI_NOTARIZE: auto
      # Temporary CI switch. Set to "true" to re-enable test steps for Tauri builds.
      TAURI_RUN_TESTS: false
      # Match the minimum macOS version declared in scripts/package/build_app_tauri.sh.
      MACOSX_DEPLOYMENT_TARGET: 10.14
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        os:
          [
            windows-latest,
            macos-latest,
          ]
        python_version: [3.9]
        node_version: [24]
        skip_rust: [false]
        skip_webui: [false]
        experimental: [false]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"
          fetch-depth: 0

      - name: Set environment variables
        run: |
          echo "RELEASE=${{ startsWith(github.ref_name, 'v') || github.ref_name == 'master' }}" >> $GITHUB_ENV
          echo "TAURI_BUILD=true" >> $GITHUB_ENV
          echo "TAURI_WATCHERS=${TAURI_WATCHERS}" >> $GITHUB_ENV
          if [ "$RUNNER_OS" = "macOS" ]; then
            echo "TAURI_BUNDLES=app" >> $GITHUB_ENV
          fi

      - name: Set tag metadata
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "VERSION_TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python_version }}

      - name: Set up Node
        if: ${{ !matrix.skip_webui }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node_version }}

      - name: Set up Rust
        if: ${{ !matrix.skip_rust }}
        uses: dtolnay/rust-toolchain@master
        id: toolchain
        with:
          toolchain: stable

      - name: Cache node_modules
        uses: actions/cache@v5
        if: ${{ !matrix.skip_webui }}
        with:
          path: |
            aw-server-rust/aw-webui/node_modules
            aw-tauri/node_modules
          key: ${{ matrix.os }}-node_modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ matrix.os }}-node_modules-

      - name: Cache cargo build
        uses: actions/cache@v5
        env:
          cache-name: cargo-build-target
        with:
          path: |
            aw-server-rust/target
            aw-tauri/src-tauri/target
          key: ${{ matrix.os }}-${{ env.cache-name }}-${{ steps.toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-${{ env.cache-name }}-${{ steps.toolchain.outputs.rustc_hash }}-

      - name: Install dependencies
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            choco install innosetup
          fi
          python -m pip install poetry==1.4.2

      - name: Build
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 60
          max_attempts: 3
          shell: bash
          command: |
            python -m venv venv
            if [ -f venv/bin/activate ]; then
              source venv/bin/activate
            elif [ -f venv/Scripts/activate ]; then
              source venv/Scripts/activate
            else
              echo "::error::Could not find virtualenv activation script"
              find venv -maxdepth 3 -type f -name activate -print
              exit 1
            fi
            poetry install
            make build PYTHON=python SKIP_WEBUI=${{ matrix.skip_webui }} SKIP_SERVER_RUST=${{ matrix.skip_rust }}
            pip freeze

      - name: Install test dependencies
        if: env.TAURI_RUN_TESTS == 'true'
        run: |
          if [ -f venv/bin/activate ]; then
            source venv/bin/activate
          elif [ -f venv/Scripts/activate ]; then
            source venv/Scripts/activate
          else
            echo "::error::Could not find virtualenv activation script"
            find venv -maxdepth 3 -type f -name activate -print
            exit 1
          fi
          python -m pip install -e ./aw-core -e ./aw-client -e ./aw-server pytest-flask
          python -c "import flask, flask_restx, flask_cors, aw_server; print('aw-server test dependencies OK')"

      - name: Run tests
        if: env.TAURI_RUN_TESTS == 'true'
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 60
          max_attempts: 3
          shell: bash
          command: |
            if [ -f venv/bin/activate ]; then
              source venv/bin/activate
            elif [ -f venv/Scripts/activate ]; then
              source venv/Scripts/activate
            else
              echo "::error::Could not find virtualenv activation script"
              find venv -maxdepth 3 -type f -name activate -print
              exit 1
            fi
            make test PYTHON=python SKIP_SERVER_RUST=${{ matrix.skip_rust }}

      - name: Package
        run: |
          if [ -f venv/bin/activate ]; then
            source venv/bin/activate
          elif [ -f venv/Scripts/activate ]; then
            source venv/Scripts/activate
          else
            echo "::error::Could not find virtualenv activation script"
            find venv -maxdepth 3 -type f -name activate -print
            exit 1
          fi
          poetry install
          make package PYTHON=python SKIP_SERVER_RUST=${{ matrix.skip_rust }}

      - name: Package dmg
        if: runner.os == 'macOS'
        run: |
          if [ -n "$CERTIFICATE_MACOS_P12_BASE64" ]; then
            ./scripts/ci/import-macos-p12.sh
          fi

          source venv/bin/activate
          PYTHON=python bash scripts/package/build-signed-tauri-dmg.sh --skip-project-build
        env:
          APPLE_EMAIL: ${{ secrets.APPLE_EMAIL }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_PERSONALID: ${{ secrets.APPLE_PERSONALID }}
          APPLE_TEAMID: ${{ secrets.APPLE_TEAMID }}
          CERTIFICATE_MACOS_P12_BASE64: ${{ secrets.CERTIFICATE_MACOS_P12_BASE64 }}
          CERTIFICATE_MACOS_P12_PASSWORD: ${{ secrets.CERTIFICATE_MACOS_P12_PASSWORD }}

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: builds-tauri-${{ matrix.os }}-py${{ matrix.python_version }}
          path: dist/activitywatch-*.*

  release-notes:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"
          fetch-depth: 0

      - uses: ActivityWatch/check-version-format-action@v2
        id: version
        with:
          prefix: "v"

      - name: Echo version
        run: |
          echo "${{ steps.version.outputs.full }} (stable: ${{ steps.version.outputs.is_stable }})"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install requests

      - name: Generate release notes
        run: |
          LAST_RELEASE=`STABLE_ONLY=${{ steps.version.output.is_stable }} ./scripts/get_latest_release.sh`
          ./scripts/build_changelog.py --range "$LAST_RELEASE...${{ steps.version.outputs.full }}"

      - name: Rename
        run: |
          mv changelog.md release_notes.md

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release_notes_tauri
          path: release_notes.md

  release:
    needs: [build, release-notes]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Display structure of downloaded files
        run: ls -R
        working-directory: dist

      - uses: ActivityWatch/check-version-format-action@v2
        id: version
        with:
          prefix: "v"

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          files: dist/*/activitywatch-*.*
          body_path: dist/release_notes_tauri/release_notes.md
          prerelease: ${{ !(steps.version.outputs.is_stable == 'true') }}  # must compare to true, since boolean outputs are actually just strings, and "false" is truthy since it's not empty: https://github.com/actions/runner/issues/1483#issuecomment-994986996
