<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>aw-watcher-screenshot-mini visualization</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Segoe UI, Arial, sans-serif;
      }

      body {
        margin: 0;
        padding: 16px;
        background: #111827;
        color: #f3f4f6;
      }

      a {
        color: inherit;
      }

      .muted {
        color: #9ca3af;
      }

      .summary {
        margin: 12px 0 20px;
        padding: 12px 14px;
        border-radius: 10px;
        background: #1f2937;
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
      }

      .card {
        overflow: hidden;
        border: 1px solid #374151;
        border-radius: 12px;
        background: #1f2937;
      }

      .card img {
        display: block;
        width: 100%;
        height: 180px;
        object-fit: cover;
        background: #0b1220;
      }

      .card-body {
        padding: 12px;
      }

      .meta {
        margin: 6px 0 0;
        font-size: 12px;
        line-height: 1.5;
        color: #cbd5e1;
      }

      .status {
        margin: 0 0 8px;
      }
    </style>
  </head>
  <body>
    <h2>Screenshot Mini</h2>
    <p id="status" class="status muted">Loading screenshots…</p>
    <div id="summary" class="summary" hidden></div>
    <div id="gallery" class="gallery"></div>
    <script src="app.js"></script>
  </body>
</html>
